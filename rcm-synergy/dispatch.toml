templates_dir = "templates"
cache_dir = ".rcm-cache"

[[route]]
event = "issue_triage"
action = "feishu_message"
template = "issue_triage.rcm.tpl"
fields = { SESSION_ID = "session_id", REPORTER = "reporter", MESSAGE = "message", TARGET_REPO = "target_repo", REPO_PATH = "repo_path", SOURCE = "source" }
